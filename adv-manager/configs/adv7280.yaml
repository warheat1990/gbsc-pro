          '0xE8':
            name: PAL VSYNC begin
            description: PAL VSYNC begin timing control
            fields:
            - name: PVBEG[4:0]
              bits: [4, 3, 2, 1, 0]
              type: int
              description: Lines after lCOUNT rollover to set V high
              default: 5
            - name: PVBEGSIGN
              bits: [5]
              type: bool
              description: PVBEG sign
              values:
                0: Sets to low when manual programming
                1: Not suitable for user programming
            - name: PVBEGDELE
              bits: [6]
              type: bool
              description: Delay V bit (even field)
              values:
                0: No delay
                1: Additional delay by one line
            - name: PVBEGDELO
              bits: [7]
              type: bool
              description: Delay V bit (odd field)
              values:
                0: No delay
                1: Additional delay by one line
          '0xE9':
            name: PAL VSYNC end
            description: PAL VSYNC end timing control
            fields:
            - name: PVEND[4:0]
              bits: [4, 3, 2, 1, 0]
              type: int
              description: Lines after lCOUNT rollover to set V low
              default: 20
            - name: PVENDSIGN
              bits: [5]
              type: bool
              description: PVEND sign
              values:
                0: Sets to low when manual programming
                1: Not suitable for user programming
            - name: PVENDDELE
              bits: [6]
              type: bool
              description: Delay V bit going low (even field)
              values:
                0: No delay
                1: Additional delay by one line
            - name: PVENDDELO
              bits: [7]
              type: bool
              description: Delay V bit going low (odd field)
              values:
                0: No delay
                1: Additional delay by one line
          '0xEA':
            name: PAL FIELD toggle
            description: PAL FIELD signal toggle timing
            fields:
            - name: PFTOG[4:0]
              bits: [4, 3, 2, 1, 0]
              type: int
              description: Lines after lCOUNT rollover to toggle F signal
              default: 3
            - name: PFTOGSIGN
              bits: [5]
              type: bool
              description: PFTOG sign
              values:
                0: Sets to low when manual programming
                1: Not suitable for user programming
            - name: PFTOGDELE
              bits: [6]
              type: bool
              description: Delay F transition (even field)
              values:
                0: No delay
                1: Additional delay by one line
            - name: PFTOGDELO
              bits: [7]
              type: bool
              description: Delay F transition (odd field)
              values:
                0: No delay
                1: Additional delay by one line
          '0xEB':
            name: Vblank Control 1
            description: Vertical blanking interval control for PAL and NTSC
            fields:
            - name: PVBIELCM[1:0]
              bits: [1, 0]
              type: enum
              description: PAL VBI even field line control
              values:
                0: VBI ends one line earlier (Line 335)
                1: ITU-R BT.470 compliant (Line 336)
                2: VBI ends one line later (Line 337)
                3: VBI ends two lines later (Line 338)
            - name: PVBIOLCM[1:0]
              bits: [3, 2]
              type: enum
              description: PAL VBI odd field line control
              values:
                0: VBI ends one line earlier (Line 22)
                1: ITU-R BT.470 compliant (Line 23)
                2: VBI ends one line later (Line 24)
                3: VBI ends two lines later (Line 25)
            - name: NVBIELCM[1:0]
              bits: [5, 4]
              type: enum
              description: NTSC VBI even field line control
              values:
                0: VBI ends one line earlier (Line 282)
                1: ITU-R BT.470 compliant (Line 283)
                2: VBI ends one line later (Line 284)
                3: VBI ends two lines later (Line 285)
            - name: NVBIOLCM[1:0]
              bits: [7, 6]
              type: enum
              description: NTSC VBI odd field line control
              values:
                0: VBI ends one line earlier (Line 20)
                1: ITU-R BT.470 compliant (Line 21)
                2: VBI ends one line later (Line 22)
                3: VBI ends two lines later (Line 23)
          '0xEC':
            name: Vblank Control 2
            description: Vertical blanking interval color control for PAL and NTSC
            fields:
            - name: PVBIECCM[1:0]
              bits: [1, 0]
              type: enum
              description: PAL VBI even field color control
              values:
                0: Color output beginning Line 335
                1: ITU-R BT.470 compliant (Line 336)
                2: Color output beginning Line 337
                3: Color output beginning Line 338
            - name: PVBIOCCM[1:0]
              bits: [3, 2]
              type: enum
              description: PAL VBI odd field color control
              values:
                0: Color output beginning Line 22
                1: ITU-R BT.470 compliant (Line 23)
                2: Color output beginning Line 24
                3: Color output beginning Line 25
            - name: NVBIECCM[1:0]
              bits: [5, 4]
              type: enum
              description: NTSC VBI even field color control
              values:
                0: Color output beginning Line 282
                1: ITU-R BT.470 compliant (Line 283)
                2: VBI ends one line later (Line 284)
                3: Color output beginning Line 285
            - name: NVBIOCCM[1:0]
              bits: [7, 6]
              type: enum
              description: NTSC VBI odd field color control
              values:
                0: Color output beginning Line 20
                1: ITU-R BT.470 compliant (Line 21)
                2: Color output beginning Line 22
                3: Color output beginning Line 23
          '0xF3':
            name: AFE_CONTROL 1
            description: Analog Front End control - antialiasing filter enable
            fields:
            - name: AA_FILT_EN[3:0]
              bits: [0]
              type: bool
              description: Antialiasing Filter 1
              values:
                0: Antialiasing Filter 1 disabled
                1: Antialiasing Filter 1 enabled
            - name: AA_FILT_EN[3:0]
              bits: [1]
              type: bool
              description: Antialiasing Filter 2
              values:
                0: Antialiasing Filter 2 disabled
                1: Antialiasing Filter 2 enabled
            - name: AA_FILT_EN[3:0]
              bits: [2]
              type: bool
              description: Antialiasing Filter 3
              values:
                0: Antialiasing Filter 3 disabled
                1: Antialiasing Filter 3 enabled
            - name: AA_FILT_EN[3:0]
              bits: [3]
              type: bool
              description: Antialiasing Filter 4
              values:
                0: Antialiasing Filter 4 disabled
                1: Antialiasing Filter 4 enabled
            - name: AA_FILT_MAN_OVR
              bits: [4]
              type: bool
              description: Antialiasing filter override
              values:
                0: Override disabled
                1: Override enabled
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits
          '0xF4':
            name: Drive strength
            description: Output driver strength control
            fields:
            - name: DR_STR_S[1:0]
              bits: [1, 0]
              type: enum
              description: Drive strength for sync output signals
              values:
                0: Low drive strength (1×) - not recommended
                1: Medium low drive strength (2×)
                2: Medium drive strength (3×)
                3: High drive strength (4×)
            - name: DR_STR_C[1:0]
              bits: [3, 2]
              type: enum
              description: Drive strength for clock output signal
              values:
                0: Low drive strength (1×) - not recommended
                1: Medium low drive strength (2×)
                2: Medium drive strength (3×)
                3: High drive strength (4×)
            - name: DR_STR[1:0]
              bits: [5, 4]
              type: enum
              description: Drive strength for data output signals
              values:
                0: Low drive strength (1×) - not recommended
                1: Medium low drive strength (2×)
                2: Medium drive strength (3×)
                3: High drive strength (4×)
            - name: Reserved
              bits: [6]
              type: reserved
              description: Reserved bit
            - name: GLITCH_FILT_BYP
              bits: [7]
              type: bool
              description: Glitch filter bypass
          '0xF8':
            name: IF comp control
            description: IF filter selection for PAL and NTSC
            fields:
            - name: IFFILTSEL[2:0]
              bits: [2, 1, 0]
              type: enum
              description: IF filter selection
              values:
                0: Bypass mode 0 dB
                1: 2 MHz NTSC -3 dB
                2: 2 MHz NTSC -6 dB
                3: 2 MHz NTSC -10 dB
                4: Reserved
                5: 3 MHz PAL -2 dB
                6: 3 MHz PAL -5 dB
                7: 3 MHz PAL -7 dB
            - name: Reserved
              bits: [7, 6, 5, 4, 3]
              type: reserved
              description: Reserved bits
          '0xF9':
            name: VS mode control
            description: VSYNC mode control and coast mode
            fields:
            - name: EXTEND_VS_MAX_FREQ
              bits: [0]
              type: bool
              description: Extend VSYNC maximum frequency
              values:
                0: Limits max VSYNC to 66.25 Hz (475 lines/frame)
                1: Limits max VSYNC to 70.09 Hz (449 lines/frame)
            - name: EXTEND_VS_MIN_FREQ
              bits: [1]
              type: bool
              description: Extend VSYNC minimum frequency
              values:
                0: Limits min VSYNC to 42.75 Hz (731 lines/frame)
                1: Limits min VSYNC to 39.51 Hz (791 lines/frame)
            - name: VS_COAST_MODE[1:0]
              bits: [3, 2]
              type: enum
              description: VSYNC coast mode (forces video standard in free-run)
              values:
                0: Autocoast mode
                1: 576i 50 Hz coast mode
                2: 480i 60 Hz coast mode
                3: Reserved
            - name: Reserved
              bits: [7, 6, 5, 4]
              type: reserved
              description: Reserved bits
          '0xFB':
            name: Peaking gain
            description: High frequency peaking gain control
            fields:
            - name: PEAKING_GAIN[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Increases/decreases gain for high frequency portions
              default: 64
          '0xFC':
            name: DNR Noise Threshold 2
            description: DNR secondary noise threshold
            fields:
            - name: DNR_TH2[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Secondary luma edge threshold for DNR
              default: 4
          '0xFD':
            name: VPP slave address
            description: Video Post Processor I2C slave address (ADV7280/7282-M only)
            fields:
            - name: Reserved
              bits: [0]
              type: reserved
              description: Reserved bit
            - name: VPP_SLAVE_ADDR[6:0]
              bits: [7, 6, 5, 4, 3, 2, 1]
              type: int
              description: VPP Map I2C address (default 0x84, 0x00 disables access)
              default: 0
          '0xFE':
            name: CSI Tx slave address
            description: CSI transmitter I2C slave address (ADV7280-M/7281-M/7282-M only)
            fields:
            - name: Reserved
              bits: [0]
              type: reserved
              description: Reserved bit
            - name: CSI_TX_SLAVE_ADDR[6:0]
              bits: [7, 6, 5, 4, 3, 2, 1]
              type: int
              description: CSI Map I2C address (default 0x88, 0x00 disables access)
              default: 0
      user_sub_map_2:
        description: User Sub Map 2 - ACE, Dither, Fast Lock, Y Average, Luma/Chroma Limits
        map_value: '0x40'
        registers:
          '0x80':
            name: ACE Control 1
            description: ACE Control 1 register
            fields:
            - name: Reserved
              bits: [6, 5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: ACE_ENABLE
              bits: [7]
              type: bool
              description: ACE enable
              values:
                0: Disable ACE
                1: Enable ACE
          '0x83':
            name: ACE Control 4
            description: ACE Control 4 register
            fields:
            - name: ACE_LUMA_GAIN[4:0]
              bits: [4, 3, 2, 1, 0]
              type: int
              description: Set ACE luma auto-contrast level to default value
              default: 13
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits
          '0x84':
            name: ACE Control 5
            description: ACE Control 5 register
            fields:
            - name: ACE_CHROMA_GAIN[3:0]
              bits: [3, 2, 1, 0]
              type: int
              description: Set ACE color auto-saturation level
              default: 8
            - name: ACE_CHROMA_MAX[3:0]
              bits: [7, 6, 5, 4]
              type: int
              description: Set maximum threshold for ACE color color-saturation level
              default: 8
          '0x85':
            name: ACE Control 6
            description: ACE Control 6 register
            fields:
            - name: ACE_GAMMA_GAIN[3:0]
              bits: [3, 2, 1, 0]
              type: int
              description: Set further contrast enhancement
              default: 8
            - name: ACE_RESPONSE_SPEED[3:0]
              bits: [7, 6, 5, 4]
              type: int
              description: Set speed of ACE response
              default: 15
          '0x92':
            name: Dither Control
            description: Dither Control register
            fields:
            - name: DOWN_DITHER_EN
              bits: [0]
              type: bool
              description: 8-bit to 6-bit down dither
              values:
                0: 8-bit to 6-bit down dither disabled
                1: 8-bit to 6-bit down dither enabled
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2, 1]
              type: reserved
              description: Reserved bits
          '0xD9':
            name: Min Max 0
            description: Minimum threshold for the incoming luma video signal
            fields:
            - name: MIN_THRESH_Y[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects the minimum threshold for the incoming luma video signal
              default: 0
          '0xDA':
            name: Min Max 1
            description: Maximum threshold for the incoming luma video signal
            fields:
            - name: MAX_THRESH_Y[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects the maximum threshold for the incoming luma video signal
              default: 255
          '0xDB':
            name: Min Max 2
            description: Mminimum threshold for the incoming chroma video signal
            fields:
            - name: MIN_THRESH_C[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects the minimum threshold for the incoming chroma video signal
              default: 0
          '0xDC':
            name: Min Max 3
            description: Maximum threshold for the incoming chroma video signal
            fields:
            - name: MAX_THRESH_C[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects the maximum threshold for the incoming chroma video signal
              default: 255
          '0xDD':
            name: Min Max 4
            description: Number of minimum/maximum luma samples allowed
            fields:
            - name: MAX_SAMPLES_ALLOWED_Y[3:0]
              bits: [3, 2, 1, 0]
              type: int
              description: Selects the number of maximum luma samples allowed in a given window before an interrupt is triggered
              default: 12
            - name: MIN_SAMPLES_ALLOWED_Y[3:0]
              bits: [7, 6, 5, 4]
              type: int
              description: Selects the number of minimum luma samples allowed in a given window before an interrupt is triggered
              default: 12
          '0xDE':
            name: Min Max 5
            description: Number of minimum/maximum chroma samples allowed
            fields:
            - name: MAX_SAMPLES_ALLOWED_C[3:0]
              bits: [3, 2, 1, 0]
              type: int
              description: Selects the number of maximum chrome samples allowed in a given window before an interrupt is triggered
              default: 12
            - name: MIN_SAMPLES_ALLOWED_C[3:0]
              bits: [7, 6, 5, 4]
              type: int
              description: Selects the number of minimum chroma samples allowed in a given window before an interrupt is triggered
              default: 12
          '0xE0':
            name: FL Control
            description: Fast Lock mode control
            fields:
            - name: FL_ENABLE
              bits: [0]
              type: bool
              description: Fast lock enable
              values:
                0: Disable fast lock mode
                1: Enable fast lock mode
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2, 1]
              type: reserved
              description: Reserved bits
          '0xE1':
            name: Y Average 0
            description: Y average value register 0 (read only)
            fields:
            - name: LINE_START[8:1]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects starting line for field averaging
              default: 1
          '0xE2':
            name: Y Average 1
            description: Y average value register 1 (read only)
            fields:
            - name: LINE_END[8:1]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects end line for field averaging
              default: 136
          '0xE3':
            name: Y Average 2
            description: Y average value register 2 (read only)
            fields:
            - name: SAMPLE_START[9:2]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects starting sample for line averaging
              default: 23
          '0xE4':
            name: Y Average 3
            description: Y average value register 3 (read only)
            fields:
            - name: SAMPLE_END[9:2]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Selects end sample for line averaging
              default: 215
          '0xE5':
            name: Y Average 4
            description: Y average value register 4 (read only)
            fields:
            - name: LINE_START[0]
              bits: [0]
              type: bool
              description: Enable Line Start
              values:
                0: Disable Line Start
                1: Enable Line Start
            - name: LINE_END[0]
              bits: [1]
              type: bool
              description: Enable Line End
              values:
                0: Disable Line End
                1: Enable Line End
            - name: Reserved
              bits: [3, 2]
              type: reserved
              description: Reserved bits
            - name: SAMPLE_START[1:0]
              bits: [5, 4]
              type: int
              description: Sample Start
            - name: SAMPLE_END[1:0]
              bits: [7, 6]
              type: int
              description: Sample End
          '0xE6':
            name: Y Average 5
            description: Y average value readback register 6 (read only)
            fields:
            - name: CAPTURE_VALUE
              bits: [0]
              type: bool
              description: Trigger used to store the readback value
              values:
                0: Disable trigger
                1: Enable trigger
            - name: Y_AVG_FILT_EN
              bits: [1]
              type: bool
              description: Enable low pass filtering of the y_averaged signal
              values:
                0: Disable low pass filtering
                1: Enable low pass filtering
            - name: Y_AVG_TIME_CONST[2:0]
              bits: [4, 3, 2]
              type: int
              description: Selects the filter cutoff to be used for filtering the y averaged data
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits
          '0xE7':
            name: Y Average Data MSB
            description: Y Average Data MSB register
            fields:
            - name: Y_AVERAGE[9:2]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Contains the averaged video data
          '0xE8':
            name: Y Average Data LSB
            description: Y Average Data LSB register
            fields:
            - name: Y_AVERAGE[1:0] 
              bits: [1, 0]
              type: int
              description: Contains the averaged video data
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2]
              type: reserved
              description: Reserved bits
      vpp_map:
        description: VPP Map - Video Post Processor (Interlaced-to-Progressive converter)
        i2c_address: '0x84'
        use_map_switching: false
        address_source:
          type: dynamic
          map: user_sub_map
          register: '0xFD'
          field: VPP_SLAVE_ADDR[6:0]
          default: 132
        note: VPP uses separate I2C address (not map_value), no map switching needed
        registers:
          '0x41':
            name: DEINT_RESET
            description: Reset the I2P (Interlaced-to-Progressive) core
            fields:
            - name: DEINT_RESET
              bits: [0]
              type: bool
              description: Reset the I2P core (0=normal, 1=reset)
              default: 0
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2, 1]
              type: reserved
              description: Reserved bits
          '0x55':
            name: I2C_DEINT_ENABLE
            description: Enable/disable I2P converter
            fields:
            - name: Reserved
              bits: [6, 5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: I2C_DEINT_ENABLE
              bits: [7]
              type: bool
              description: Enable I2P converter (requires ADV_TIMING_MODE_EN=1 and output timing changes)
              default: 0
          '0x5A':
            name: I2P Smooth Control
            description: I2P smooth control (undocumented register)
            fields:
            - name: I2P_SMOOTH
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: enum
              description: I2P smooth mode (2=disable, 26=enable smooth)
              values:
                26: Enable smooth
                2: Disable smooth
          '0x5B':
            name: ADV_TIMING_MODE_EN
            description: Advanced timing mode enable (required for I2P converter)
            fields:
            - name: Reserved
              bits: [6, 5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: ADV_TIMING_MODE_EN
              bits: [7]
              type: bool
              description: Enable advanced timing mode (0=enable, 1=disable) - must be 0 for I2P to work
              default: 0
