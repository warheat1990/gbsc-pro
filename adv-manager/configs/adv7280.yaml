devices:
  ADV7280:
    address: '0x42'
    description: ADV7280 Video Decoder - 10-Bit, 4x Oversampled SDTV Video Decoder with Deinterlacer
    register_maps:
      user_sub_map:
        description: User Sub Map - Main register map (default)
        map_value: '0x00'
        registers:
          '0x00':
            name: Input Control
            description: NSEL[4:0] bits allow the user to select an input channel and the input format
            fields:
            - name: NSEL[4:0]
              bits: [4, 3, 2, 1, 0]
              type: enum
              description: Input channel selection
              values:
                0: CVBS input on AIN1
                1: CVBS input on AIN2
                2: CVBS input on AIN3
                3: CVBS input on AIN4
                8: Y input on AIN1, C input on AIN2
                9: Y input on AIN3, C input on AIN4
                12: Y input on AIN1, Pb input on AIN2, Pr input on AIN3
                14: Differential positive on AIN1, differential negative on AIN2
                15: Differential positive on AIN3, differential negative on AIN4
            - name: Unknown
              bits: [7, 6, 5]
              type: unknown
              description: Unknown/undocumented bits
          '0x01':
            name: Video Selection 1
            description: Video standard and sync processor control
            fields:
            - name: Reserved
              bits: [2, 1, 0]
              type: reserved
              description: Reserved bits - do not modify
            - name: ENVSPROC
              bits: [3]
              type: bool
              description: Enables VSYNC processor
            - name: Reserved
              bits: [4]
              type: reserved
              description: Reserved bit - do not modify
            - name: BETACAM
              bits: [5]
              type: bool
              description: BETACAM levels enable
            - name: ENHSPLL
              bits: [6]
              type: bool
              description: Enables HSYNC processor
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bit - do not modify
              default: 1
          '0x02':
            name: Video Selection 2
            description: VID_SEL[3:0] bits allow the user to select the input video standard
            fields:
            - name: Reserved
              bits: [3, 2, 1, 0]
              type: reserved
              description: Reserved bits - do not modify
              default: 4
            - name: VID_SEL[7:4]
              bits: [7, 6, 5, 4]
              type: enum
              description: Video standard selection
              default: 0
              values:
                0: Set to default - Autodetects PAL/B/PAL/G/PAL/H/PAL/I/PAL/D, NTSC/J (no pedestal), SECAM
                1: Autodetects PAL/B/PAL/G/PAL/H/PAL/I/PAL/D, NTSC/M (pedestal), SECAM
                2: Autodetects PAL/N (pedestal), NTSC/J (no pedestal), SECAM
                3: Autodetects PAL/N (pedestal), NTSC/M (pedestal) SECAM
                4: NTSC/J
                5: NTSC/M
                6: PAL 60
                7: NTSC 4:43
                8: PAL/B/G/H/I/D
                9: PAL/N = PAL/B/PAL/G/PAL/H/PAL/I/PAL/D (with pedestal)
                10: PAL/M (without pedestal)
                11: PAL/M
                12: PAL/Combination N
                13: PAL/Combination N (with pedestal)
                14: SECAM
                15: SECAM
          '0x03':
            name: Output control
            description: Output control register for pixel outputs, HS and VS/FIELD/SFL
            fields:
            - name: Reserved
              bits: [5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
              default: 12
            - name: TOD
              bits: [6]
              type: bool
              description: Tristate output drivers
              values:
                0: Output drivers enabled
                1: Output drivers tristated
            - name: VBI_EN
              bits: [7]
              type: bool
              description: Vertical blanking interval data enable
              values:
                0: All lines filtered and scaled
                1: Only active video region filtered
          '0x04':
            name: Extended output control
            description: Extended output control including range and BT.656 mode selection
            fields:
            - name: Range
              bits: [0]
              type: bool
              description: Output range selection
              values:
                0: 16 ≤ Y ≤ 235, 16 ≤ C/P ≤ 240 (ITU-R BT.656)
                1: 1 ≤ Y ≤ 254, 1 ≤ C/P ≤ 254 (Extended range)
            - name: EN_SFL_PIN
              bits: [1]
              type: bool
              description: SFL output enable
              values:
                0: Disables SFL output
                1: Outputs SFL information on the SFL pin
            - name: BL_C_VBI
              bits: [2]
              type: bool
              description: Blank chroma during VBI
              values:
                0: Decode and output color during VBI
                1: Blank Cr and Cb values during VBI
            - name: TIM_OE
              bits: [3]
              type: bool
              description: Enables timing signals output
              values:
                0: HS, VS, FIELD tristated
                1: HS, VS, FIELD forced active
            - name: Reserved
              bits: [6, 5, 4]
              type: reserved
              description: Reserved bits
              default: 3
            - name: BT.656-4
              bits: [7]
              type: bool
              description: BT.656 mode selection
              values:
                0: ITU-R BT.656-3 compatible
                1: ITU-R BT.656-4 compatible
          '0x07':
            name: Autodetect enable
            description: Enable autodetection for different video standards
            fields:
            - name: AD_PAL_EN
              bits: [0]
              type: bool
              description: PAL B/D/I/G/H autodetect enable
            - name: AD_NTSC_EN
              bits: [1]
              type: bool
              description: NTSC autodetect enable
            - name: AD_PALM_EN
              bits: [2]
              type: bool
              description: PAL M autodetect enable
            - name: AD_PALN_EN
              bits: [3]
              type: bool
              description: PAL N autodetect enable
            - name: AD_P60_EN
              bits: [4]
              type: bool
              description: PAL 60 autodetect enable
            - name: AD_N443_EN
              bits: [5]
              type: bool
              description: NTSC 4.43 autodetect enable
            - name: AD_SECAM_EN
              bits: [6]
              type: bool
              description: SECAM autodetect enable
            - name: AD_SEC525_EN
              bits: [7]
              type: bool
              description: SECAM 525 autodetect enable
          '0x08':
            name: Contrast
            description: Contrast adjustment control
            fields:
            - name: CON[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Contrast adjust (0x00 gain=0, 0x80 gain=1, 0xFF gain=2)
              default: 128
          '0x0A':
            name: Brightness adjust
            description: Brightness control for video signal
            fields:
            - name: BRI[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Brightness adjust (0x00=0 IRE, 0x7F=+30 IRE, 0x80=-30 IRE)
              default: 0
          '0x0B':
            name: Hue adjust
            description: Color hue adjustment
            fields:
            - name: HUE[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: 'Hue adjustment (range: -90° to +90°)'
              default: 0
          '0x0C':
            name: Default Value Y
            description: Default Y value for free-run mode
            fields:
            - name: DEF_VAL_EN
              bits: [0]
              type: bool
              description: Default value enable
              values:
                0: Free-run mode dependent on DEF_VAL_AUTO_EN
                1: Forces free-run mode on
            - name: DEF_VAL_AUTO_EN
              bits: [1]
              type: bool
              description: Default value automatic enable
              values:
                0: Disables free-run mode
                1: Enables automatic free-run mode
            - name: DEF_Y[5:0]
              bits: [7, 6, 5, 4, 3, 2]
              type: int
              description: Default Y value (Y[7:0] = {DEF_Y[5:0], 0, 0})
              default: 13
          '0x0D':
            name: Default Value C
            description: Default Cr/Cb values for free-run mode
            fields:
            - name: DEF_C[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Cr[3:0] = {DEF_C[7:4]}, Cb[3:0] = {DEF_C[3:0]} - default gives blue screen
              default: 124
          '0x0E':
            name: ADI Control 1
            description: Control register for accessing different register maps
            fields:
            - name: Reserved
              bits: [4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: SUB_USR_EN[1:0]
              bits: [6, 5]
              type: enum
              description: Enables access to interrupt/VDP map and User Sub Map 2
              values:
                0: Accesses User Sub Map (main register space)
                1: Accesses Interrupt/VDP Sub Map
                2: Accesses User Sub Map 2
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bit
          '0x0F':
            name: Power management
            description: Power management and reset control
            fields:
            - name: Reserved
              bits: [1, 0]
              type: reserved
              description: Reserved bits
            - name: Unknown
              bits: [2]
              type: unknown
              description: Unknown/undocumented bit
            - name: Reserved
              bits: [4, 3]
              type: reserved
              description: Reserved bits
            - name: PWRDWN
              bits: [5]
              type: bool
              description: Power-down control
              values:
                0: System functional
                1: Powered down
            - name: Reserved
              bits: [6]
              type: reserved
              description: Reserved bits
            - name: Reset
              bits: [7]
              type: bool
              description: Chip reset (self-clearing, takes ~2ms)
              values:
                0: Normal operation
                1: Starts reset sequence
          '0x10':
            name: Status 1
            description: Status register (read only)
            readonly: true
            fields:
            - name: IN_LOCK
              bits: [0]
              type: bool
              description: 1 = in lock (now)
            - name: LOST_LOCK
              bits: [1]
              type: bool
              description: 1 = lost lock (since last read)
            - name: FSC_LOCK
              bits: [2]
              type: bool
              description: 1 = fSC lock (now)
            - name: FOLLOW_PW
              bits: [3]
              type: bool
              description: 1 = peak white AGC mode active
            - name: AD_RESULT[2:0]
              bits: [6, 5, 4]
              type: enum
              description: Autodetection result - detected standard
              values:
                0: NTSC M/NTSC J
                1: NTSC 4.43
                2: PAL M
                3: PAL 60
                4: PAL B/G/H/I/D
                5: SECAM
                6: PAL Combination N
                7: SECAM 525
            - name: COL_KILL
              bits: [7]
              type: bool
              description: 1 = color kill is active
          '0x11':
            name: IDENT
            description: Chip identification (read only)
            readonly: true
            fields:
            - name: IDENT[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Chip revision ID
              default: 66
          '0x12':
            name: Status 2
            description: Additional status flags (read only)
            readonly: true
            fields:
            - name: MVCS_DET
              bits: [0]
              type: bool
              description: MV color striping detected (1 = detected)
            - name: MVCS_T3
              bits: [1]
              type: bool
              description: MV color striping type (0 = Type 2, 1 = Type 3)
            - name: MV_PS_DET
              bits: [2]
              type: bool
              description: MV pseudosync detected (1 = detected)
            - name: MV_AGC_DET
              bits: [3]
              type: bool
              description: MV AGC pulses detected (1 = detected)
            - name: LL_NSTD
              bits: [4]
              type: bool
              description: Nonstandard line length (1 = detected)
            - name: FSC_NSTD
              bits: [5]
              type: bool
              description: fSC frequency nonstandard (1 = detected)
            - name: Reserved
              bits: [7, 6]
              type: reserved
              description: Reserved bits
          '0x13':
            name: Status 3
            description: Additional status information (read only)
            readonly: true
            fields:
            - name: INST_HLOCK
              bits: [0]
              type: bool
              description: 1 = horizontal lock achieved (unfiltered)
            - name: Reserved
              bits: [1]
              type: reserved
              description: Reserved bit
            - name: SD_OP_50Hz
              bits: [2]
              type: bool
              description: SD field rate detect (0 = 60Hz, 1 = 50Hz)
            - name: Reserved
              bits: [3]
              type: reserved
              description: Reserved bit
            - name: FREE_RUN_ACT
              bits: [4]
              type: bool
              description: 1 = free-run mode active
            - name: STD_FLD_LEN
              bits: [5]
              type: bool
              description: 1 = field length standard (correct field length found)
            - name: Interlaced
              bits: [6]
              type: bool
              description: 1 = interlaced video detected (field sequence found)
            - name: PAL_SW_LOCK
              bits: [7]
              type: bool
              description: 1 = swinging burst detected (reliable swinging burst sequence)
          '0x14':
            name: Analog clamp control
            description: Analog clamp and free-run pattern control
            fields:
            - name: FREE_RUN_PAT_SEL[2:0]
              bits: [2, 1, 0]
              type: enum
              description: Free-run pattern selection
              values:
                0: Single color set by DEF_C and DEF_Y
                1: 100% color bars
                2: Luma ramp
                5: Boundary box
            - name: Reserved
              bits: [3]
              type: reserved
              description: Reserved bit
            - name: CCLEN
              bits: [4]
              type: bool
              description: Current clamp enable
              values:
                0: Current sources switched off
                1: Current sources enabled
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits
          '0x15':
            name: Digital Clamp Control 1
            description: Digital clamp control and timing
            fields:
            - name: Reserved
              bits: [3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: DCFE
              bits: [4]
              type: bool
              description: Digital clamp freeze enable
              values:
                0: Digital clamp on
                1: Digital clamp off
            - name: DCT[1:0]
              bits: [6, 5]
              type: enum
              description: Digital clamp timing (time constant)
              values:
                0: Slow (TC = 1 sec)
                1: Medium (TC = 0.5 sec)
                2: Fast (TC = 0.1 sec)
                3: TC dependent on video
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bit
          '0x17':
            name: Shaping Filter Control 1
            description: Y and C shaping filter mode selection
            fields:
            - name: YSFM[4:0]
              bits: [4, 3, 2, 1, 0]
              type: enum
              description: Y shaping filter mode in CVBS-only mode
              values:
                0: Auto wide notch for poor quality / wideband filter with comb for good quality
                1: Auto narrow notch for poor quality / wideband filter with comb for good quality
                2: SVHS 1
                3: SVHS 2
                4: SVHS 3
                5: SVHS 4
                6: SVHS 5
                7: SVHS 6
                8: SVHS 7
                9: SVHS 8
                10: SVHS 9
                11: SVHS 10
                12: SVHS 11
                13: SVHS 12
                14: SVHS 13
                15: SVHS 14
                16: SVHS 15
                17: SVHS 16
                18: SVHS 17
                19: SVHS 18 (CCIR 601)
                20: PAL NN1
                21: PAL NN2
                22: PAL NN3
                23: PAL WN1
                24: PAL WN2
                25: NTSC NN1
                26: NTSC NN2
                27: NTSC NN3
                28: NTSC WN1
                29: NTSC WN2
                30: NTSC WN3
                31: Reserved
            - name: CSFM[2:0]
              bits: [7, 6, 5]
              type: enum
              description: C shaping filter mode
              values:
                0: Autoselection 1.5 MHz
                1: Autoselection 2.17 MHz
                2: SH1
                3: SH2
                4: SH3
                5: SH4
                6: SH5
                7: Wideband mode
          '0x18':
            name: Shaping Filter Control 2
            description: Wideband Y shaping filter mode selection
            fields:
            - name: WYSFM[4:0]
              bits: [4, 3, 2, 1, 0]
              type: enum
              description: Wideband Y shaping filter mode for Y/C, YPrPb, B/W inputs
              values:
                0: Reserved, do not use
                1: Reserved, do not use
                2: SVHS 1
                3: SVHS 2
                4: SVHS 3
                5: SVHS 4
                6: SVHS 5
                7: SVHS 6
                8: SVHS 7
                9: SVHS 8
                10: SVHS 9
                11: SVHS 10
                12: SVHS 11
                13: SVHS 12
                14: SVHS 13
                15: SVHS 14
                16: SVHS 15
                17: SVHS 16
                18: SVHS 17
                19: SVHS 18 (CCIR 601)
            - name: Reserved
              bits: [6, 5]
              type: reserved
              description: Reserved bits
            - name: WYSFMOVR
              bits: [7]
              type: bool
              description: Enables use of the automatic WYSFM filter
              values:
                0: Autoselection of best filter
                1: Manual select filter using WYSFM[4:0]
          '0x19':
            name: Comb filter control
            description: Comb filter bandwidth control for PAL and NTSC
            fields:
            - name: PSFSEL[1:0]
              bits: [1, 0]
              type: enum
              description: PAL comb filter bandwidth
              values:
                0: Narrow
                1: Medium
                2: Wide
                3: Widest
            - name: NSFSEL[1:0]
              bits: [3, 2]
              type: enum
              description: NTSC comb filter bandwidth
              values:
                0: Narrow
                1: Medium
                2: Medium
                3: Wide
            - name: Reserved
              bits: [7, 6, 5, 4]
              type: reserved
              description: Reserved bits
              default: 15
          '0x1D':
            name: ADI Control 2
            description: Additional control register
            fields:
            - name: Reserved
              bits: [5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
            - name: Reserved
              bits: [6]
              type: reserved
              description: Reserved bit
              default: 1
            - name: TRI_LLC
              bits: [7]
              type: bool
              description: Tristate LLC driver
              values:
                0: LLC pin active
                1: LLC pin tristated
          '0x27':
            name: Pixel delay control
            description: Luma and chroma timing adjustment
            fields:
            - name: LTA[1:0]
              bits: [1, 0]
              type: enum
              description: Luma timing adjust - timing difference between chroma and luma
              values:
                0: No delay
                1: Luma one clock (37 ns) late
                2: Luma two clocks (74 ns) early
                3: Luma one clock (37 ns) early
            - name: Reserved
              bits: [2]
              type: reserved
              description: Reserved bit
            - name: CTA[2:0]
              bits: [5, 4, 3]
              type: enum
              description: Chroma timing adjust
              values:
                0: Reserved
                1: Chroma + two pixels (early)
                2: Chroma + one pixel (early)
                3: No delay
                4: Chroma − one pixel (late)
                5: Chroma − two pixels (late)
                6: Chroma − three pixels (late)
                7: Reserved
            - name: AUTO_PDC_EN
              bits: [6]
              type: bool
              description: Automatic programmed delay control
              values:
                0: Use values in LTA[1:0] and CTA[2:0]
                1: LTA and CTA values determined automatically
            - name: SWPC
              bits: [7]
              type: bool
              description: Swap Cr and Cb samples
              values:
                0: No swapping
                1: Swaps the Cr and Cb output samples
          '0x2B':
            name: Misc gain control
            description: Miscellaneous gain control settings
            fields:
            - name: PW_UPD
              bits: [0]
              type: bool
              description: Peak white update rate
              values:
                0: Updates once per video line
                1: Updates once per field
            - name: Reserved
              bits: [5, 4, 3, 2, 1]
              type: reserved
              description: Reserved bits
              default: 16
            - name: CKE
              bits: [6]
              type: bool
              description: Color kill enable
              values:
                0: Color kill disabled
                1: Color kill enabled
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bit
              default: 1
          '0x2C':
            name: AGC mode control
            description: Automatic gain control mode selection
            fields:
            - name: CAGC[1:0]
              bits: [1, 0]
              type: enum
              description: Chroma automatic gain control
              values:
                0: Manual fixed gain (uses CMG[11:0])
                1: Uses luma gain for chroma
                2: Automatic gain (based on color burst)
                3: Freeze chroma gain
            - name: Reserved
              bits: [3, 2]
              type: reserved
              description: Reserved bits
              default: 3
            - name: LAGC[2:0]
              bits: [6, 5, 4]
              type: enum
              description: Luma automatic gain control
              values:
                0: Manual fixed gain (uses LMG[11:0])
                1: AGC peak white algorithm off (blank level to sync tip)
                2: AGC peak white algorithm on (blank level to sync tip)
                7: Freeze gain
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bit
              default: 1
          '0x2D':
            name: Chroma Gain Control 1
            description: Chroma gain control upper bits
            fields:
            - name: CMG[11:8]
              bits: [3, 2, 1, 0]
              type: int
              description: Chroma manual gain / Chroma gain upper 4 bits
              default: 4
            - name: Reserved
              bits: [5, 4]
              type: reserved
              description: Reserved bits
              default: 3
            - name: CAGT[1:0]
              bits: [7, 6]
              type: enum
              description: Chroma AGC tracking speed
              values:
                0: Slow (TC = 2 sec)
                1: Medium (TC = 1 sec)
                2: Reserved
                3: Adaptive
          '0x2E':
            name: Chroma Gain Control 2
            description: Chroma gain control lower bits
            fields:
            - name: CMG[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Chroma manual gain lower 8 bits (range 0-4095)
              default: 0
          '0x2F':
            name: Luma Gain Control 1
            description: Luma gain control upper bits
            fields:
            - name: LMG[11:8]
              bits: [3, 2, 1, 0]
              type: int
              description: Luma manual gain / Luma gain upper 4 bits (read in auto mode)
            - name: Reserved
              bits: [5, 4]
              type: reserved
              description: Reserved bits
              default: 3
            - name: LAGT[1:0]
              bits: [7, 6]
              type: enum
              description: Luma AGC tracking speed
              values:
                0: Slow (TC = 2 sec)
                1: Medium (TC = 1 sec)
                2: Fast (TC = 0.2 sec)
                3: Adaptive
          '0x30':
            name: Luma Gain Control 2
            description: Luma gain control lower bits
            fields:
            - name: LMG[7:0]
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Luma manual gain / Luma gain lower 8 bits (range 1024-4095)
          '0x31':
            name: VS/FIELD Control 1
            description: VSYNC and FIELD control settings
            fields:
            - name: Reserved
              bits: [2, 1, 0]
              type: reserved
              description: Reserved bits
              default: 2
            - name: HVSTIM
              bits: [3]
              type: bool
              description: Horizontal VSYNC timing
              values:
                0: Start of line relative to HSE (HSYNC end)
                1: Start of line relative to HSB (HSYNC begin)
            - name: NEWAVMODE
              bits: [4]
              type: bool
              description: EAV/SAV mode selection
              values:
                0: EAV/SAV codes generated to suit Analog Devices encoders
                1: Manual VS/FIELD position controlled by registers 0x32, 0x33, 0xE5-0xEA
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits
          '0x32':
            name: VS/FIELD Control 2
            description: VSYNC begin control
            fields:
            - name: Reserved
              bits: [5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
              default: 1
            - name: VSBHE
              bits: [6]
              type: bool
              description: VSYNC signal behavior (even field)
              values:
                0: VSYNC signal goes high in the middle of the line
                1: VSYNC signal changes state at the start of the line
            - name: VSBHO
              bits: [7]
              type: bool
              description: VSYNC signal behavior (odd field)
              values:
                0: VSYNC signal goes high in the middle of the line
                1: VSYNC signal changes state at the start of the line
          '0x33':
            name: VS/FIELD Control 3
            description: VSYNC end control
            fields:
            - name: Reserved
              bits: [5, 4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits
              default: 4
            - name: VSEHE
              bits: [6]
              type: bool
              description: VSYNC signal end (even field)
              values:
