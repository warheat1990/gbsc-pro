devices:
  ADV7391:
    address: '0x56'
    description: ADV7391 - Triple 10-Bit High Speed Video DAC for SD/ED/HD
    register_maps:
      main:
        description: Main Register Map
        map_value: '0x00'
        use_map_switching: false
        registers:
          '0x00':
            name: Power Mode Register
            description: Power mode control
            fields:
            - name: SLEEP_MODE
              bits: [0]
              type: enum
              description: Sleep mode
              default: 0
              values:
                0: Sleep mode off
                1: Sleep mode on
            - name: PLL_OVERSAMPLE
              bits: [1]
              type: enum
              description: PLL and oversampling control
              default: 1
              values:
                0: PLL on
                1: PLL off
            - name: DAC3_POWER
              bits: [2]
              type: enum
              description: DAC 3 power on/off
              default: 1
              values:
                0: DAC 3 off
                1: DAC 3 on
            - name: DAC2_POWER
              bits: [3]
              type: enum
              description: DAC 2 power on/off
              default: 1
              values:
                0: DAC 2 off
                1: DAC 2 on
            - name: DAC1_POWER
              bits: [4]
              type: enum
              description: DAC 1 power on/off
              default: 1
              values:
                0: DAC 1 off
                1: DAC 1 on
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits - do not modify
          '0x01':
            name: Mode Select Register
            description: Input mode selection
            fields:
            - name: Reserved
              bits: [0]
              type: reserved
              description: Reserved bits - do not modify
            - name: DDR_EDGE_ALIGN
              bits: [2, 1]
              type: enum
              description: DDR clock edge alignment (ED2 and HD DDR modes only)
              default: 0
              values:
                0: Chroma on rising, luma on falling
                1: Reserved
                2: Reserved
                3: Luma on rising, chroma on falling
            - name: Reserved
              bits: [3]
              type: reserved
              description: Reserved bits - do not modify
            - name: INPUT_MODE
              bits: [6, 5, 4]
              type: enum
              description: Input mode (see 0x30 bits[7:3] for ED/HD standard)
              default: 0
              values:
                0: SD input
                1: ED/HD-SDR input
                2: ED/HD-DDR input
                3: Reserved
                4: Reserved
                5: Reserved
                6: Reserved
                7: ED (at 54 MHz) input
            - name: Reserved
              bits: [7]
              type: reserved
              description: Reserved bits - do not modify
          '0x02':
            name: Mode Register 0
            description: Mode control and output configuration
            fields:
            - name: ED_HD_SYNC_OUT_EN
              bits: [7]
              type: enum
              description: ED/HD sync output enable
              default: 0
              values:
                0: No sync output
                1: Output ED/HD syncs on HSYNC and VSYNC pins
            - name: SD_SYNC_OUT_EN
              bits: [6]
              type: enum
              description: SD sync output enable
              default: 0
              values:
                0: No sync output
                1: Output SD syncs on HSYNC and VSYNC pins
            - name: RGB_YPBPR_SEL
              bits: [5]
              type: enum
              description: RGB/YPrPb output select
              default: 1
              values:
                0: RGB component outputs
                1: YPrPb component outputs
            - name: SYNC_ON_RGB
              bits: [4]
              type: enum
              description: Sync on RGB
              default: 0
              values:
                0: No sync
                1: Sync on all RGB outputs
            - name: MANUAL_CSC
              bits: [3]
              type: enum
              description: Manual CSC matrix adjust
              default: 0
              values:
                0: Disable manual CSC matrix adjust
                1: Enable manual CSC matrix adjust
            - name: TEST_BLACK_BAR
              bits: [2]
              type: enum
              description: Test pattern black bar
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: HD_INTERLACE_EXT
              bits: [1]
              type: enum
              description: HD interlace external VSYNC and HSYNC
              default: 0
              values:
                0: Default
                1: Recommended for HD HSYNC/VSYNC interlace mode
            - name: Reserved
              bits: [0]
              type: reserved
              description: Reserved bits - do not modify
          '0x03':
            name: ED/HD CSC Matrix 0
            description: Color space conversion matrix LSBs
            fields:
            - name: GY_LSB
              bits: [1, 0]
              type: int
              description: LSBs for GY
              range: [0, 3]
              default: 3
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2]
              type: reserved
              description: Reserved bits - do not modify
          '0x04':
            name: ED/HD CSC Matrix 1
            description: Color space conversion matrix LSBs
            fields:
            - name: RV_LSB
              bits: [1, 0]
              type: int
              description: LSBs for RV
              range: [0, 3]
              default: 0
            - name: BU_LSB
              bits: [3, 2]
              type: int
              description: LSBs for BU
              range: [0, 3]
              default: 0
            - name: GV_LSB
              bits: [5, 4]
              type: int
              description: LSBs for GV
              range: [0, 3]
              default: 3
            - name: GU_LSB
              bits: [7, 6]
              type: int
              description: LSBs for GU
              range: [0, 3]
              default: 3
          '0x05':
            name: ED/HD CSC Matrix 2
            description: GY bits[9:2]
            fields:
            - name: GY
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Bits[9:2] for GY
              range: [0, 255]
              default: 78
          '0x06':
            name: ED/HD CSC Matrix 3
            description: GU bits[9:2]
            fields:
            - name: GU
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Bits[9:2] for GU
              range: [0, 255]
              default: 14
          '0x07':
            name: ED/HD CSC Matrix 4
            description: GV bits[9:2]
            fields:
            - name: GV
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Bits[9:2] for GV
              range: [0, 255]
              default: 36
          '0x08':
            name: ED/HD CSC Matrix 5
            description: BU bits[9:2]
            fields:
            - name: BU
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Bits[9:2] for BU
              range: [0, 255]
              default: 146
          '0x09':
            name: ED/HD CSC Matrix 6
            description: RV bits[9:2]
            fields:
            - name: RV
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Bits[9:2] for RV
              range: [0, 255]
              default: 124
          '0x0B':
            name: DAC Output Levels
            description: DAC 1, DAC 2, DAC 3 output levels
            fields:
            - name: DAC_GAIN
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Positive/negative gain to DAC output voltage (signed 8-bit)
              range: [0, 255]
              default: 0
          '0x0D':
            name: DAC Power Mode
            description: DAC low power mode and oversample rate
            fields:
            - name: Reserved
              bits: [7, 6, 5, 4]
              type: reserved
              description: Reserved bits - do not modify
            - name: SD_ED_OVERSAMPLE
              bits: [3]
              type: enum
              description: SD/ED oversample rate select
              default: 0
              values:
                0: SD=16×, ED=8×
                1: SD=8×, ED=4×
            - name: DAC3_LOW_POWER
              bits: [2]
              type: enum
              description: DAC 3 low power mode
              default: 0
              values:
                0: DAC 3 low power disabled
                1: DAC 3 low power enabled
            - name: DAC2_LOW_POWER
              bits: [1]
              type: enum
              description: DAC 2 low power mode
              default: 0
              values:
                0: DAC 2 low power disabled
                1: DAC 2 low power enabled
            - name: DAC1_LOW_POWER
              bits: [0]
              type: enum
              description: DAC 1 low power mode
              default: 0
              values:
                0: DAC 1 low power disabled
                1: DAC 1 low power enabled
          '0x10':
            name: Cable Detection
            description: Cable detection and autopower-down
            fields:
            - name: Reserved
              bits: [7, 6, 5]
              type: reserved
              description: Reserved bits - do not modify
            - name: DAC_AUTOPOWERDOWN
              bits: [4]
              type: enum
              description: Unconnected DAC autopower-down
              default: 0
              values:
                0: DAC autopower-down disable
                1: DAC autopower-down enable
            - name: Reserved
              bits: [3, 2]
              type: reserved
              description: Reserved bits - do not modify
            - name: DAC2_DETECT
              bits: [1]
              type: enum
              description: DAC 2 cable detect (read only)
              default: 0
              values:
                0: Cable detected on DAC 2
                1: DAC 2 unconnected
            - name: DAC1_DETECT
              bits: [0]
              type: enum
              description: DAC 1 cable detect (read only)
              default: 0
              values:
                0: Cable detected on DAC 1
                1: DAC 1 unconnected
          '0x13':
            name: Pixel Port Readback A
            description: Pixel Port Readback A register
            readonly: true
            fields:
            - name: PIXEL_PORT_A
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: P[7:0] readback
              range: [0, 255]
              default: 0
          '0x14':
            name: Pixel Port Readback B
            description: Pixel Port Readback B register
            readonly: true
            fields:
            - name: PIXEL_PORT_B
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: P[15:8] readback
              range: [0, 255]
              default: 0
          '0x16':
            name: Control port readback
            description: Control port readback control
            readonly: true
            fields:
            - name: Reserved
              bits: [2, 1, 0]
              type: reserved
              description: Reserved bits - do not modify
            - name: VSYNC_READBACK
              bits: [3]
              type: bool
              description: VSYNC readback
              default: 0
              values:
                0: VSYNC readback disabled
                1: VSYNC readback enabled
            - name: HSYNC_READBACK
              bits: [4]
              type: bool
              description: HSYNC readback
              default: 0
              values:
                0: HSYNC readback disabled
                1: HSYNC readback enabled
            - name: SFL_READBACK
              bits: [5]
              type: bool
              description: SFL readback
              default: 0
              values:
                0: SFL readback disabled
                1: SFL readback enabled
            - name: Reserved
              bits: [7, 6]
              type: reserved
              description: Reserved bits - do not modify
          '0x17':
            name: Software Reset
            description: Software reset control
            fields:
            - name: Reserved
              bits: [0]
              type: reserved
              description: Reserved bits - do not modify
            - name: SW_RESET
              bits: [1]
              type: enum
              description: Software reset (self-clearing)
              default: 0
              values:
                0: Normal operation
                1: Reset device
            - name: Reserved
              bits: [7, 6, 5, 4, 3, 2]
              type: reserved
              description: Reserved bits - do not modify
          '0x30':
            name: ED/HD Mode Register 1
            description: ED/HD output standard, sync format, and standard selection
            fields:
            - name: ED_HD_STANDARD
              bits: [7, 6, 5, 4, 3]
              type: enum
              description: ED/HD standard
              default: 0
              values:
                0: SMPTE 293M, ITU-BT.1358 525p at 59.94 Hz
                1: BTA-1004, ITU-BT.1362 525p at 59.94 Hz
                2: ITU-BT.1358 625p at 50 Hz
                3: ITU-BT.1362 625p at 50 Hz
                4: SMPTE 296M-1, SMPTE 274M-2 720p at 60 Hz/59.94 Hz
                5: SMPTE 296M-3 720p at 50 Hz
                6: SMPTE 296M-4, SMPTE 274M-5 720p at 30 Hz/29.97 Hz
                7: SMPTE 296M-6 720p at 25 Hz
                8: SMPTE 296M-7, SMPTE 296M-8 720p at 24 Hz/23.98 Hz
                9: SMPTE 240M 1035i at 60 Hz/59.94 Hz
                10: Reserved
                11: Reserved
                12: SMPTE 274M-4, SMPTE 274M-5 1080i at 30 Hz/29.97 Hz
                13: SMPTE 274M-6 1080i at 25 Hz
                14: SMPTE 274M-7, SMPTE 274M-8 1080p at 30 Hz/29.97 Hz
                15: SMPTE 274M-9 1080p at 25 Hz
                16: SMPTE 274M-10, SMPTE 274M-11 1080p at 24 Hz/23.98 Hz
                17: ITU-R BT.709-5 1080Psf at 24 Hz
            - name: ED_HD_SYNC_FORMAT
              bits: [2]
              type: enum
              description: ED/HD input synchronization format
              default: 0
              values:
                0: External HSYNC, VSYNC and field inputs
                1: Embedded EAV/SAV codes
            - name: ED_HD_OUTPUT_STD
              bits: [1, 0]
              type: enum
              description: ED/HD output standard
              default: 0
              values:
                0: EIA-770.2 output (ED), EIA-770.3 output (HD)
                1: EIA-770.1 output
                2: Output levels for full input range
                3: Reserved
          '0x31':
            name: ED/HD Mode Register 2
            description: ED/HD pixel data valid, oversample, test pattern, VBI, undershoot, sharpness
            fields:
            - name: ED_HD_SHARPNESS
              bits: [7]
              type: enum
              description: ED/HD sharpness filter
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_UNDERSHOOT
              bits: [6, 5]
              type: enum
              description: ED/HD undershoot limiter
              default: 0
              values:
                0: Disabled
                1: −11 IRE
                2: −6 IRE
                3: −1.5 IRE
            - name: ED_HD_VBI_OPEN
              bits: [4]
              type: enum
              description: ED/HD vertical blanking interval (VBI) open
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_TEST_HATCH
              bits: [3]
              type: enum
              description: ED/HD test pattern hatch/field
              default: 0
              values:
                0: Hatch
                1: Field/frame
            - name: ED_HD_TEST_EN
              bits: [2]
              type: enum
              description: ED/HD test pattern enable
              default: 0
              values:
                0: HD test pattern off
                1: HD test pattern on
            - name: HD_OVERSAMPLE
              bits: [1]
              type: enum
              description: HD oversample rate select
              default: 0
              values:
                0: 4×
                1: 2×
            - name: ED_HD_PIXEL_VALID
              bits: [0]
              type: enum
              description: ED/HD pixel data valid
              default: 0
              values:
                0: Pixel data valid off
                1: Pixel data valid on
          '0x32':
            name: ED/HD Mode Register 3
            description: ED/HD Y and color delay, CGMS enable and CRC
            fields:
            - name: ED_HD_CGMS_CRC
              bits: [7]
              type: enum
              description: ED/HD CGMS CRC enable
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_CGMS_EN
              bits: [6]
              type: enum
              description: ED/HD CGMS enable
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_COLOR_DELAY
              bits: [5, 4, 3]
              type: enum
              description: ED/HD color delay with respect to falling edge of HSYNC
              default: 0
              values:
                0: 0 clock cycles
                1: One clock cycle
                2: Two clock cycles
                3: Three clock cycles
                4: Four clock cycles
            - name: ED_HD_Y_DELAY
              bits: [2, 1, 0]
              type: enum
              description: ED/HD Y delay with respect to falling edge of HSYNC
              default: 0
              values:
                0: 0 clock cycles
                1: One clock cycle
                2: Two clock cycles
                3: Three clock cycles
                4: Four clock cycles
          '0x33':
            name: ED/HD Mode Register 4
            description: ED/HD Cr/Cb sequence, input format, sinc filter, chroma SSAF, double buffering
            fields:
            - name: ED_HD_DOUBLE_BUF
              bits: [7]
              type: enum
              description: ED/HD double buffering
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: Reserved
              bits: [6]
              type: reserved
              description: Reserved bits - do not modify
            - name: ED_HD_CHROMA_SSAF
              bits: [5]
              type: enum
              description: ED/HD chroma SSAF filter
              default: 1
              values:
                0: Disabled
                1: Enabled
            - name: Reserved
              bits: [4]
              type: reserved
              description: Reserved bits - do not modify
            - name: SINC_COMP_FILTER
              bits: [3]
              type: enum
              description: Sinc compensation filter on DAC 1, DAC 2, DAC 3
              default: 1
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_INPUT_FMT
              bits: [2]
              type: enum
              description: ED/HD input format
              default: 0
              values:
                0: 8-bit input
                1: 10-bit input
            - name: Reserved
              bits: [1]
              type: reserved
              description: Reserved bits - do not modify
            - name: ED_HD_CR_CB_SEQ
              bits: [0]
              type: enum
              description: ED/HD Cr/Cb sequence
              default: 0
              values:
                0: Cb after falling edge of HSYNC
                1: Cr after falling edge of HSYNC
          '0x34':
            name: ED/HD Mode Register 5
            description: ED/HD timing reset, sync control, Macrovision, field/VSYNC, counter mode
            fields:
            - name: ED_HD_COUNTER_MODE
              bits: [7]
              type: enum
              description: ED/HD horizontal/vertical counter mode
              default: 0
              values:
                0: Update field/line counter
                1: Field/line counter free running
            - name: ED_HD_VSYNC_FIELD
              bits: [6]
              type: enum
              description: ED/HD VSYNC input/field input
              default: 1
              values:
                0: Field input
                1: VSYNC input
            - name: Reserved
              bits: [5]
              type: reserved
              description: Reserved bits - do not modify
            - name: ED_MACROVISION_EN
              bits: [4]
              type: enum
              description: ED Macrovision enable (ADV7390/ADV7392 only)
              default: 0
              values:
                0: ED Macrovision disabled
                1: ED Macrovision enabled
            - name: Reserved
              bits: [3]
              type: reserved
              description: Reserved bits - do not modify
              default: 1
            - name: ED_HD_VSYNC_CTRL
              bits: [2]
              type: enum
              description: ED/HD VSYNC control
              default: 0
              values:
                0: VSYNC output control
                1: VSYNC output control
            - name: ED_HD_HSYNC_CTRL
              bits: [1]
              type: enum
              description: ED/HD HSYNC control
              default: 0
              values:
                0: HSYNC output control
                1: HSYNC output control
            - name: ED_HD_TIMING_RESET
              bits: [0]
              type: enum
              description: ED/HD timing reset
              default: 0
              values:
                0: Internal ED/HD timing counters enabled
                1: Resets the internal ED/HD timing counters
          '0x35':
            name: ED/HD Mode Register 6
            description: ED/HD sync on PrPb, DAC swap, gamma, adaptive filter
            fields:
            - name: ED_HD_ADAPTIVE_EN
              bits: [7]
              type: enum
              description: ED/HD adaptive filter enable
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_ADAPTIVE_MODE
              bits: [6]
              type: enum
              description: ED/HD adaptive filter mode
              default: 0
              values:
                0: Mode A
                1: Mode B
            - name: ED_HD_GAMMA_EN
              bits: [5]
              type: enum
              description: ED/HD gamma correction enable
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: ED_HD_GAMMA_CURVE
              bits: [4]
              type: enum
              description: ED/HD gamma correction curve select
              default: 0
              values:
                0: Gamma Correction Curve A
                1: Gamma Correction Curve B
            - name: ED_HD_DAC_SWAP
              bits: [3]
              type: enum
              description: ED/HD color DAC swap
              default: 0
              values:
                0: DAC 2 = Pb, DAC 3 = Pr
                1: DAC 2 = Pr, DAC 3 = Pb
            - name: ED_HD_SYNC_PRPB
              bits: [2]
              type: enum
              description: ED/HD sync on PrPb
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: Reserved
              bits: [1, 0]
              type: reserved
              description: Reserved bits - do not modify
          '0x36':
            name: ED/HD Y Level
            description: ED/HD Test Pattern Y level
            fields:
            - name: Y_LEVEL
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Y level value
              range: [0, 255]
              default: 160
          '0x37':
            name: ED/HD Cr Level
            description: ED/HD Test Pattern Cr level
            fields:
            - name: CR_LEVEL
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Cr level value
              range: [0, 255]
              default: 128
          '0x38':
            name: ED/HD Cb Level
            description: ED/HD Test Pattern Cb level
            fields:
            - name: CB_LEVEL
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: Cb level value
              range: [0, 255]
              default: 128
          '0x39':
            name: ED/HD Mode Register 7
            description: EIA/CEA-861B synchronization compliance
            fields:
            - name: Reserved
              bits: [7, 6]
              type: reserved
              description: Reserved bits - do not modify
            - name: ED_HD_EIA_CEA_861B_SYNC_COMPL
              bits: [2]
              type: enum
              description: ED/HD EIA/CEA-861B synchronization compliance
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: Reserved
              bits: [4, 3, 2, 1, 0]
              type: reserved
              description: Reserved bits - do not modify
          '0x3A':
            name: ED/HD Mode Register 8
            description: Invert sync polarity and blank
            fields:
            - name: Reserved
              bits: [7, 6, 5, 4, 3]
              type: reserved
              description: Reserved bits - do not modify
            - name: INV_PBLANK_POL
              bits: [2]
              type: enum
              description: Invert PBLANK polarity
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: INV_PVSYNC_POL
              bits: [1]
              type: enum
              description: Invert PVSYNC polarity
              default: 0
              values:
                0: Disabled
                1: Enabled
            - name: INV_PHSYNC_POL
              bits: [0]
              type: enum
              description: Invert PHSYNC polarity
              default: 0
              values:
                0: Disabled
                1: Enabled
          '0x40':
            name: ED/HD Sharpness Filter Gain
            description: ED/HD sharpness filter gain values A and B
            fields:
            - name: SHARP_GAIN_A
              bits: [3, 2, 1, 0]
              type: int
              description: ED/HD sharpness filter gain Value A (signed 4-bit)
              range: [0, 15]
              default: 0
            - name: SHARP_GAIN_B
              bits: [7, 6, 5, 4]
              type: int
              description: ED/HD sharpness filter gain Value B (signed 4-bit)
              range: [0, 15]
              default: 0
          '0x41':
            name: ED/HD CGMS Data 0
            description: ED/HD CGMS data bits C19 to C16
            fields:
            - name: CGMS_DATA_0
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: CGMS C19 to C16
              range: [0, 255]
              default: 0
          '0x42':
            name: ED/HD CGMS Data 1
            description: ED/HD CGMS data bits C15 to C8
            fields:
            - name: CGMS_DATA_1
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: CGMS C15 to C8
              range: [0, 255]
              default: 0
          '0x43':
            name: ED/HD CGMS Data 2
            description: ED/HD CGMS data bits C7 to C0
            fields:
            - name: CGMS_DATA_2
              bits: [7, 6, 5, 4, 3, 2, 1, 0]
              type: int
              description: CGMS C7 to C0
              range: [0, 255]
              default: 0
          '0x44':
            name: ED/HD Gamma A0
            description: ED/HD Gamma Curve A (Point 24)
            fields:
            - name: GAMMA_A0
